name: Daily Exchange Rate Scrape

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggers from the Actions tab

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run scraper
        run: npm run scrape

      - name: Commit and push if data changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add changes
          git add public/data.json
          
          # Check if there is anything to commit
          if git diff --cached --quiet; then
            echo "No changes in data.json. Skipping commit."
          else
            echo "Data changed. Committing and pushing..."
            git commit -m "chore: auto-update LKR exchange rates [skip ci]"
            git push
          fi
